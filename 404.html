<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Page Not Found | VanitySign Transfers</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/VanitySignLogo.png">
    <meta property="og:title" content="VanitySign Transfers">
    <meta property="og:description" content="Luxury transfer services across Portugal and Spain">
    <meta property="og:image" content="https://pap-vanitysign-a6fd9.web.app/assets/VanitySignLogo.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://pap-vanitysign-a6fd9.web.app/assets/VanitySignLogo.png">

    <link rel="stylesheet" href="style.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .error-msg {
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 500px;
        }
        .btn-home {
            background-color: var(--gold);
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background-color: var(--gold-hover);
        }
    </style>
</head>
<body>

    <!-- A reutilizar os mesmos controlos superiores para consistência -->
    <div class="top-controls">
        <div class="lang-switcher">
            <button onclick="changeLanguage('en')" title="English"><img src="https://flagcdn.com/w40/gb.png" class="flag-icon" alt="EN"></button>
            <button onclick="changeLanguage('pt')" title="Português"><img src="https://flagcdn.com/w40/pt.png" class="flag-icon" alt="PT"></button>
            <button onclick="changeLanguage('es')" title="Español"><img src="https://flagcdn.com/w40/es.png" class="flag-icon" alt="ES"></button>
        </div>
        <div class="theme-switcher">
            <button onclick="toggleTheme()" id="theme-btn">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>
    </div>

    <!-- Menu de Definições (móvel) -->
    <div class="settings-wrapper fixed-settings">
        <button class="settings-btn" type="button"><i class="fa-solid fa-gear"></i></button>
        <div class="settings-dropdown" id="settingsDropdown">
            <span class="settings-label">Language</span>
            <div class="lang-switcher">
                <button onclick="changeLanguage('en')" title="English" type="button"><img src="https://flagcdn.com/w40/gb.png" class="flag-icon" alt="EN"></button>
                <button onclick="changeLanguage('pt')" title="Português" type="button"><img src="https://flagcdn.com/w40/pt.png" class="flag-icon" alt="PT"></button>
                <button onclick="changeLanguage('es')" title="Español" type="button"><img src="https://flagcdn.com/w40/es.png" class="flag-icon" alt="ES"></button>
            </div>
            <span class="settings-label">Theme</span>
            <div class="theme-switcher">
                <button onclick="toggleTheme()" id="theme-btn" type="button"><i class="fa-solid fa-sun"></i></button>
            </div>
        </div>
    </div>

    <main class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title serif-font" data-i18n="404_title">Page Not Found</h2>
        <p class="error-msg" data-i18n="404_msg">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="index.html" class="btn-home" data-i18n="btn_home">Return Home</a>
    </main>
    <script src="config.js"></script>
<script src="js/core.js?v=5"></script>
<script src="js/shared-ui.js?v=5"></script>
</body>
</html>
